# Pivot-Tech middleware — CI/CD
#
# Job "test"  : lint + migrate + test on every push and PR. No AWS required.
# Job "deploy": build -> ECR -> App Runner, only on push to main, after "test".
#               AWS account 430155298813 / region us-east-1. The App Runner step
#               skips gracefully until APPRUNNER_SERVICE_ARN is set.
name: deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: "430155298813"
  ECR_REGISTRY: 430155298813.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: pivot-tech-middleware
  AWS_ROLE_ARN: arn:aws:iam::430155298813:role/pivot-tech-middleware-role

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: pivottech
          POSTGRES_PASSWORD: pivottech
          POSTGRES_DB: pivottech
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pivottech"
          --health-interval 5s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql://pivottech:pivottech@localhost:5432/pivottech
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run migrate
      - run: npm test

  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
    env:
      APPRUNNER_SERVICE_ARN: ${{ secrets.APPRUNNER_SERVICE_ARN }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:latest" .
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"

      # App Runner ARN isn't provisioned yet — skip gracefully until it is.
      - name: Check App Runner config
        id: guard
        run: |
          if [ -n "$APPRUNNER_SERVICE_ARN" ]; then
            echo "apprunner=true" >> "$GITHUB_OUTPUT"
          else
            echo "apprunner=false" >> "$GITHUB_OUTPUT"
            echo "::notice::APPRUNNER_SERVICE_ARN not set — skipping App Runner deploy (image still pushed to ECR)."
          fi

      - name: Deploy to App Runner
        if: steps.guard.outputs.apprunner == 'true'
        run: |
          aws apprunner start-deployment \
            --service-arn "$APPRUNNER_SERVICE_ARN" \
            --region "$AWS_REGION"
