# Pivot-Tech middleware — CI/CD
#
# Job "test"  : lint + migrate + test on every push and PR. No AWS required.
# Job "deploy": build -> ECR -> App Runner, only on push to main, only after
#               "test" passes. Skips gracefully until AWS secrets are configured
#               so the pipeline stays green before AWS is wired up.
name: deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: pivot-tech-middleware

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: pivottech
          POSTGRES_PASSWORD: pivottech
          POSTGRES_DB: pivottech
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pivottech"
          --health-interval 5s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql://pivottech:pivottech@localhost:5432/pivottech
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run migrate
      - run: npm test

  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
    env:
      # Surfaced from secrets so steps can detect whether AWS is configured.
      # (secrets cannot be read directly in job/step `if:` conditions.)
      AWS_DEPLOY_ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
      APPRUNNER_SERVICE_ARN: ${{ secrets.APPRUNNER_SERVICE_ARN }}
    steps:
      - uses: actions/checkout@v4

      # Decide what's configured. Missing AWS creds => skip the whole deploy
      # (job still succeeds). Missing App Runner ARN => build/push only.
      - name: Check AWS configuration
        id: guard
        run: |
          if [ -n "$AWS_DEPLOY_ROLE_ARN" ]; then
            echo "aws=true" >> "$GITHUB_OUTPUT"
          else
            echo "aws=false" >> "$GITHUB_OUTPUT"
            echo "::notice::AWS_DEPLOY_ROLE_ARN not set — skipping ECR build/push and App Runner deploy."
          fi
          if [ -n "$APPRUNNER_SERVICE_ARN" ]; then
            echo "apprunner=true" >> "$GITHUB_OUTPUT"
          else
            echo "apprunner=false" >> "$GITHUB_OUTPUT"
            echo "::notice::APPRUNNER_SERVICE_ARN not set — will skip the App Runner deploy step."
          fi

      - name: Configure AWS credentials
        if: steps.guard.outputs.aws == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        if: steps.guard.outputs.aws == 'true'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        if: steps.guard.outputs.aws == 'true'
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" -t "$REGISTRY/$ECR_REPOSITORY:latest" .
          docker push "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$REGISTRY/$ECR_REPOSITORY:latest"

      - name: Deploy to App Runner
        if: steps.guard.outputs.aws == 'true' && steps.guard.outputs.apprunner == 'true'
        run: |
          aws apprunner start-deployment \
            --service-arn "$APPRUNNER_SERVICE_ARN" \
            --region "$AWS_REGION"
